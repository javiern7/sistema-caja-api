spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/sistema_caja
    username: cajaapi
    password: cajaapi
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
server:
  port: 8080

app:
  security:
    bootstrap-users:
      - id: 1
        username: admin
        password: Admin123*
        role: ADMIN
        active: true
        permissions:
          - usuario.gestionar
          - rol.gestionar
          - negocioevento.gestionar
          - venta.registrar
          - venta.anular
          - compra.registrar
          - egreso.registrar
          - caja.abrir
          - caja.cerrar
          - stock.consultar
      - id: 2
        username: cajero
        password: Cajero123*
        role: CAJERO
        active: true
        permissions:
          - venta.registrar
          - egreso.registrar
          - caja.abrir
          - caja.cerrar
