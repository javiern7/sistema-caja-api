spring:
  datasource:
    url: jdbc:postgresql://db-host:5432/sistema_caja
    username: app_user
    password: change_me
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
server:
  port: 8080

app:
  security:
    bootstrap-users:
      - id: 1
        username: admin
        password: Admin123*
        role: ADMIN
        active: true
        permissions:
          - usuario.gestionar
          - rol.gestionar
          - negocioevento.gestionar
          - venta.registrar
          - venta.anular
          - compra.registrar
          - egreso.registrar
          - caja.abrir
          - caja.cerrar
          - stock.consultar
